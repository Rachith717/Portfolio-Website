<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gallery | Rachith VC</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->

    <nav>

        <div class="logo">
            Rachith VC
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Gear</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

    </nav>

    <!-- Page Title -->

    <section class="gallery-header">

        <h1>Wildlife Gallery</h1>

        <p>
            Explore my collection of wildlife photographs.
        </p>

    </section>

    <!-- Filter Buttons -->

    <section class="filters">

        <button class="filter-btn active"
                data-category="all">
            All
        </button>

        <button class="filter-btn"
                data-category="birds">
            Birds
        </button>

        <button class="filter-btn"
                data-category="mammals">
            Mammals
        </button>

        <button class="filter-btn"
                data-category="reptiles">
            Reptiles
        </button>

    </section>

    <!-- Gallery Grid -->

    <section class="gallery">

        <div id="gallery-grid">

        </div>

    </section>

    <script src="js/gallery.js"></script>

    <div id="photoModal" class="modal">

    <div class="modal-content">

        <span class="close-btn">&times;</span>

        <img id="modalImage">

        <h2 id="modalTitle"></h2>

        <p>
            <strong>Location:</strong>
            <span id="modalLocation"></span>
        </p>

        <p>
            <strong>Camera:</strong>
            <span id="modalCamera"></span>
        </p>

        <p>
            <strong>Lens:</strong>
            <span id="modalLens"></span>
        </p>

        <p>
            <strong>Settings:</strong>
            <span id="modalSettings"></span>
        </p>

        <p id="modalDescription"></p>

    </div>

</div>
<div id="photoModal" class="modal">

    <div class="modal-content">

        <span class="close-btn">&times;</span>

        <img id="modalImage">

        <h2 id="modalTitle"></h2>

        <p>
            <strong>Location:</strong>
            <span id="modalLocation"></span>
        </p>

        <p>
            <strong>Camera:</strong>
            <span id="modalCamera"></span>
        </p>

        <p>
            <strong>Lens:</strong>
            <span id="modalLens"></span>
        </p>

        <p>
            <strong>Settings:</strong>
            <span id="modalSettings"></span>
        </p>

        <p id="modalDescription"></p>

    </div>

</div>

</body>
</html>
